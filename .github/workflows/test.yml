name: CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ---------------------------------------------------------------------------
  # Job 1 — Run the full test suite (unit, integration, E2E)
  # ---------------------------------------------------------------------------
  test:
    name: Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: fastapi_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/fastapi_db
      # Non-sensitive fixed values used only for signing test JWT tokens
      JWT_SECRET_KEY: ci-test-jwt-secret-key-minimum-32-chars-x
      JWT_REFRESH_SECRET_KEY: ci-test-refresh-secret-key-min-32-chars
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      # Lower bcrypt rounds to keep test hashing fast in CI
      BCRYPT_ROUNDS: 4
      PYTHONUNBUFFERED: 1
      PYTHONDONTWRITEBYTECODE: 1

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Run unit tests
        run: pytest tests/unit/ -v

      - name: Run integration tests
        run: pytest tests/integration/ -v --cov-append

      - name: Run E2E tests
        run: pytest tests/e2e/ -v --cov-append

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 14

  # ---------------------------------------------------------------------------
  # Job 2 — Build the Docker image; push to Docker Hub on main/master only
  # ---------------------------------------------------------------------------
  docker:
    name: Build & Push Docker Image
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          # Only push on main/master; PRs build only (no push)
          push: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/is601-final:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/is601-final:${{ github.sha }}
          # Use GitHub Actions cache to speed up repeated builds
          cache-from: type=gha
          cache-to: type=gha,mode=max
